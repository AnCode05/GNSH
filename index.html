    let currentIdx = 0;
    let scoreCorrect = 0;
    let scoreWrong = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        const q = quizData[currentIdx];
        document.getElementById("question-text").innerText = q.question;
        document.getElementById("question-number").innerText = `Câu ${currentIdx + 1}/${quizData.length}`;
        document.getElementById("next-btn").style.display = "none";
        
        const optionsContainer = document.getElementById("answer-options");
        optionsContainer.innerHTML = "";
        
        q.answers.forEach((ans, index) => {
            const btn = document.createElement("button");
            btn.className = "btn-answer";
            btn.innerText = ans;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });

        updateProgress();
    }

    function checkAnswer(selectedIdx, btn) {
        if (answered) return;
        answered = true;
        const correctIdx = quizData[currentIdx].correct;
        const buttons = document.getElementsByClassName("btn-answer");

        if (selectedIdx === correctIdx) {
            btn.classList.add("correct");
            scoreCorrect++;
            document.getElementById("correct-score").innerText = scoreCorrect;
        } else {
            btn.classList.add("wrong");
            buttons[correctIdx].classList.add("correct"); // Hiện câu đúng khi trả lời sai
            scoreWrong++;
            document.getElementById("wrong-score").innerText = scoreWrong;
        }
        
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function updateProgress() {
        const percent = (currentIdx / quizData.length) * 100;
        document.getElementById("progress-bar").style.width = percent + "%";
    }

    function showResult() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-correct").innerText = scoreCorrect;
    }

    loadQuestion();
</script>
