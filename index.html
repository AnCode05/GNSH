<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />

<title>Quiz Lịch Sử Việt Nam</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Be Vietnam Pro',sans-serif;
}

body{
    min-height:100vh;

    background:
    radial-gradient(circle at top left,#2563eb 0%,transparent 25%),
    radial-gradient(circle at bottom right,#9333ea 0%,transparent 25%),
    #020617;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;

    color:white;
}

.quiz-container{

    width:100%;
    max-width:950px;

    background:rgba(15,23,42,0.92);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    border-radius:32px;

    padding:35px;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    0 0 60px rgba(59,130,246,0.12);

}

.title{

    font-size:38px;
    font-weight:700;

    background:linear-gradient(90deg,#38bdf8,#a855f7);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:10px;
}

.desc{
    color:#94a3b8;
    margin-bottom:30px;
    line-height:1.7;
}

.stats{

    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:18px;

    margin-bottom:25px;
}

.stat{

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    border-radius:20px;

    padding:20px;

    text-align:center;
}

.stat-title{

    color:#94a3b8;
    font-size:14px;

    margin-bottom:10px;
}

.stat-value{

    font-size:30px;
    font-weight:700;
}

.correct-color{
    color:#22c55e;
}

.wrong-color{
    color:#ef4444;
}

.question-color{
    color:#38bdf8;
}

.progress-box{

    width:100%;
    height:16px;

    background:#172036;

    border-radius:999px;

    overflow:hidden;

    margin-bottom:35px;
}

.progress-bar{

    width:0%;
    height:100%;

    border-radius:999px;

    background:linear-gradient(90deg,#38bdf8,#8b5cf6);

    transition:0.35s ease;
}

.question-box{

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    border-radius:28px;

    padding:30px;
}

.question-number{

    color:#38bdf8;

    font-weight:600;

    margin-bottom:15px;
}

.question{

    font-size:25px;

    font-weight:600;

    line-height:1.6;

    margin-bottom:30px;
}

.answers{

    display:grid;

    gap:18px;
}

.answer{

    padding:18px 22px;

    background:#131c31;

    border:2px solid transparent;

    border-radius:18px;

    cursor:pointer;

    transition:0.25s;

    font-size:17px;

    line-height:1.6;

    user-select:none;
}

.answer:hover{

    transform:translateY(-3px);

    background:#1d2946;

    border-color:#3b82f6;
}

.answer.disabled{
    pointer-events:none;
}

.correct{

    background:rgba(34,197,94,0.15)!important;

    border-color:#22c55e!important;

    color:#dcfce7;
}

.wrong{

    background:rgba(239,68,68,0.15)!important;

    border-color:#ef4444!important;

    color:#fee2e2;
}

.result{

    text-align:center;

    padding:40px 10px;
}

.result h2{

    font-size:42px;

    background:linear-gradient(90deg,#38bdf8,#a855f7);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:20px;
}

.result-score{

    font-size:65px;

    font-weight:700;

    color:#38bdf8;

    margin-bottom:20px;
}

.result p{

    font-size:22px;

    margin:12px 0;
}

.restart-btn{

    margin-top:30px;

    padding:16px 30px;

    border:none;

    border-radius:18px;

    background:linear-gradient(90deg,#38bdf8,#8b5cf6);

    color:white;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.25s;
}

.restart-btn:hover{

    transform:translateY(-3px) scale(1.02);
}

@media(max-width:768px){

    .stats{
        grid-template-columns:1fr;
    }

    .question{
        font-size:21px;
    }

    .answer{
        font-size:15px;
    }

    .title{
        font-size:30px;
    }

}

</style>
</head>

// ==========================
// SAO CHÉP DỮ LIỆU
// ==========================

let questions = JSON.parse(JSON.stringify(originalQuestions));

// ==========================
// DOM
// ==========================

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");

const currentEl = document.getElementById("current");
const totalEl = document.getElementById("total");

const correctEl = document.getElementById("correct");
const wrongEl = document.getElementById("wrong");

const progressBar = document.getElementById("progressBar");

const questionNumberEl = document.getElementById("questionNumber");

const quizArea = document.getElementById("quizArea");

// ==========================
// BIẾN
// ==========================

let currentQuestion = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

// ==========================
// XÁO MẢNG
// ==========================

function shuffleArray(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }
}

// ==========================
// CHUẨN HÓA CÂU HỎI
// ==========================

function prepareQuestions(){

    questions.forEach(q => {

        const correctAnswer = q.answers[q.correct];

        shuffleArray(q.answers);

        q.correct = q.answers.indexOf(correctAnswer);

    });

    shuffleArray(questions);
}

// ==========================
// LOAD QUESTION
// ==========================

function loadQuestion(){

    answered = false;

    const q = questions[currentQuestion];

    currentEl.textContent = currentQuestion + 1;

    questionNumberEl.textContent = `Câu ${currentQuestion + 1}`;

    questionEl.textContent = q.question;

    answersEl.innerHTML = "";

    q.answers.forEach((answer, index) => {

        const btn = document.createElement("div");

        btn.className = "answer";

        btn.innerHTML = `
            <strong>${String.fromCharCode(65 + index)}.</strong>
            ${answer}
        `;

        btn.addEventListener("click", () => {
            selectAnswer(btn, index);
        });

        answersEl.appendChild(btn);

    });

    updateProgress();
}

// ==========================
// CHỌN ĐÁP ÁN
// ==========================

function selectAnswer(element, index){

    if(answered) return;

    answered = true;

    const q = questions[currentQuestion];

    const allAnswers = document.querySelectorAll(".answer");

    allAnswers.forEach(btn => {
        btn.classList.add("disabled");
    });

    if(index === q.correct){

        element.classList.add("correct");

        correctCount++;

    }else{

        element.classList.add("wrong");

        allAnswers[q.correct].classList.add("correct");

        wrongCount++;
    }

    correctEl.textContent = correctCount;
    wrongEl.textContent = wrongCount;

    setTimeout(() => {

        currentQuestion++;

        if(currentQuestion < questions.length){

            loadQuestion();

        }else{

            showResult();
        }

    }, 1300);
}

// ==========================
// THANH TIẾN TRÌNH
// ==========================

function updateProgress(){

    const percent = (currentQuestion / questions.length) * 100;

    progressBar.style.width = `${percent}%`;
}

// ==========================
// KẾT QUẢ
// ==========================

function showResult(){

    progressBar.style.width = "100%";

    const percent = Math.round(
        (correctCount / questions.length) * 100
    );

    quizArea.innerHTML = `

        <div class="result">

            <h2>Hoàn Thành Quiz 🎉</h2>

            <div class="result-score">
                ${correctCount}/${questions.length}
            </div>

            <p>✅ Số câu đúng: <b>${correctCount}</b></p>

            <p>❌ Số câu sai: <b>${wrongCount}</b></p>

            <p>⭐ Chính xác: <b>${percent}%</b></p>

            <button class="restart-btn" onclick="restartQuiz()">
                Làm lại
            </button>

        </div>
    `;
}

// ==========================
// RESET QUIZ
// ==========================

function restartQuiz(){

    questions = JSON.parse(JSON.stringify(originalQuestions));

    currentQuestion = 0;
    correctCount = 0;
    wrongCount = 0;
    answered = false;

    correctEl.textContent = 0;
    wrongEl.textContent = 0;

    prepareQuestions();

    quizArea.innerHTML = `

        <div class="question-box">

            <div class="question-number" id="questionNumber">
                Câu 1
            </div>

            <div class="question" id="question"></div>

            <div class="answers" id="answers"></div>

        </div>
    `;

    window.location.reload();
}

// ==========================
// START
// ==========================

totalEl.textContent = questions.length;

prepareQuestions();

loadQuestion();

</script>
