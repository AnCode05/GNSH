<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sử Việt Tranh Tài - Premium Edition</title>
    <style>
        :root {
            --ancient-red: #8b0000;
            --gold: #d4af37;
            --paper: #f4e4bc;
            --ink: #2b2b2b;
            --success: #2d6a4f;
            --error: #a4161a;
        }

        body {
            font-family: 'Segoe UI', Roboto, serif;
            background: radial-gradient(circle, #3d0101 0%, #1a0000 100%);
            color: var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--paper);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(139, 0, 0, 0.1);
            width: 90%;
            max-width: 700px;
            text-align: center;
            border: 8px double var(--ancient-red);
            position: relative;
        }

        /* Profile Banner mới */
        .player-profile {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(139, 0, 0, 0.05);
            border-radius: 50px;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: white;
        }

        .player-display-name {
            font-weight: bold;
            color: var(--ancient-red);
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .container::before {
            content: "❖";
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--ancient-red);
        }

        .hidden { display: none; }

        h1 { 
            color: var(--ancient-red); 
            margin-bottom: 0.5rem; 
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            padding: 15px;
            width: 80%;
            border: 2px solid var(--ancient-red);
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-align: center;
        }

        button {
            background-color: var(--ancient-red);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #5e0000;
            box-shadow: 0 0 15px var(--gold);
            transform: translateY(-2px);
        }

        .timer-container {
            width: 100%;
            height: 8px;
            background: #ccc;
            border-radius: 4px;
            margin: 15px 0;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--ancient-red);
            transition: width 0.1s linear;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .option-btn {
            background-color: #fff;
            color: var(--ink);
            border: 1.5px solid #bba;
            text-align: center;
            padding: 12px;
            font-size: 0.95rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .option-btn:hover {
            background-color: #fdf2d5;
            border-color: var(--ancient-red);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid var(--ancient-red);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        th { background: var(--ancient-red); color: var(--gold); padding: 12px; }
        td { padding: 10px; border: 1px solid #ddd; }

        .correct-flash { background-color: var(--success) !important; color: white !important; }
        .wrong-flash { background-color: var(--error) !important; color: white !important; }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            .container { padding: 1.5rem; width: 95%; }
        }
    </style>
</head>
<body>

    <!-- MÀN HÌNH BẮT ĐẦU -->
    <div class="container" id="start-screen">
        <h1>SỬ VIỆT TRANH TÀI</h1>
        <p><i>"Dân ta phải biết sử ta..."</i></p>
        <hr style="border: 0.5px solid var(--ancient-red); width: 50%;">
        <br>
        <input type="text" id="player-name" placeholder="Nhập danh tính của bạn...">
        <br>
        <button onclick="checkAndInit()">KHAI CUỘC</button>
    </div>

    <!-- MÀN HÌNH TRÒ CHƠI -->
    <div class="container hidden" id="quiz-screen">
        <!-- Khu vực hiển thị Tên & Avatar -->
        <div class="player-profile">
            <img src="" id="display-avatar" class="player-avatar" alt="Avatar">
            <span id="display-name" class="player-display-name">Anh Hùng</span>
        </div>

        <div class="stats">
            <span>Đúng: <span id="correct-count" style="color:var(--success)">0</span></span>
            <span>Điểm: <span id="current-score" style="color:var(--ancient-red)">0</span></span>
        </div>

        <div class="timer-container"><div id="timer-bar"></div></div>
        <h4 id="question-info" style="margin:0; color: #777;">Câu 1/23</h4>
        <p id="question-text" style="font-size: 1.2rem; font-weight: bold;"></p>
        <div class="options-grid" id="options-box"></div>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div class="container hidden" id="result-screen">
        <h1>BẢNG VÀNG</h1>
        <div id="result-avatar-box"></div>
        <h2 id="final-msg"></h2>
        <p>Hào kiệt <strong id="res-name"></strong> đạt được:</p>
        <p><strong id="final-points" style="font-size: 2.5rem; color: var(--ancient-red);">0</strong> điểm</p>
        
        <h3>TOP 5 CAO THỦ</h3>
        <table>
            <thead>
                <tr>
                    <th>Hạng</th>
                    <th>Anh Hùng</th>
                    <th>Điểm</th>
                </tr>
            </thead>
            <tbody id="leaderboard-data"></tbody>
        </table>
        <br>
        <button onclick="location.reload()">TÁI ĐẤU</button>
    </div>

    <script>
        const allQuestions = [
            { q: "Hiện nay, 54 dân tộc ở Việt Nam được chia thành mấy nhóm ngữ hệ?", a: ["Năm nhóm ngữ hệ", "Hai nhóm ngữ hệ", "Ba nhóm ngữ hệ", "Bốn nhóm ngữ hệ"], c: 0 },
            { q: "Sức mạnh nào góp phần quyết định giúp dân tộc Việt Nam giành thắng lợi lớn chống ngoại xâm?", a: ["Khối Đại đoàn kết dân tộc", "Nghệ thuật quân sự độc đáo", "Tinh thần đấu tranh anh dũng", "Truyền thống yêu nước"], c: 0 },
            { q: "Triều đại nào mở đầu cho thời đại phong kiến độc lập, tự chủ của dân tộc Việt Nam?", a: ["Triều Ngô", "Triều Nguyễn", "Triều Tiền Lý", "Triều Lê"], c: 0 },
            { q: "Thiết chế chính trị quân chủ trung ương tập quyền ở Việt Nam đạt đến đỉnh cao vào thời nào?", a: ["Thời Lê sơ", "Thời Lý", "Thời Trần", "Thời Nguyễn"], c: 0 },
            { q: "Một trong những chính sách củng cố đại đoàn kết dân tộc của các triều đại phong kiến là:", a: ["Gả công chúa cho thủ lĩnh vùng biên giới", "Xóa bỏ mọi tô thuế", "Dùng quân sự buộc thuần phục", "Chia ruộng đất cho mọi tầng lớp"], c: 0 },
            { q: "Vai trò của khối đại đoàn kết dân tộc trong sự nghiệp xây dựng và bảo vệ Tổ quốc hiện nay?", a: ["Là cơ sở để huy động sức mạnh toàn dân tộc", "Là cơ sở xóa bỏ mọi mâu thuẫn xã hội", "Là cơ sở tiếp thu văn hóa bên ngoài", "Là nền tảng liên minh với láng giềng"], c: 0 },
            { q: "Khối đại đoàn kết dân tộc có vai trò như thế nào đối với đấu tranh chống ngoại xâm?", a: ["Là nhân tố quan trọng, quyết định thắng lợi", "Nhân tố duy nhất quyết định", "Không đóng góp nhiều", "Là nhân tố thứ yếu"], c: 0 },
            { q: "Ba nguyên tắc của Đảng trong xây dựng khối đại đoàn kết dân tộc hiện nay là:", a: ["Đoàn kết, bình đẳng và tương trợ nhau cùng phát triển", "Đoàn kết, dân chủ và bình đẳng", "Bình đẳng, tự quyết và tương trợ", "Bình đẳng, chủ quyền và tự quyết"], c: 0 },
            { q: "Ngữ hệ là gì?", a: ["Một nhóm ngôn ngữ có cùng nguồn gốc", "Ngôn ngữ chính của một nhóm dân tộc", "Ngôn ngữ riêng của một dân tộc", "Nhóm các dân tộc nói chung ngôn ngữ"], c: 0 },
            { q: "“Thời Lê Trung Hưng, văn minh Đại Việt phát triển theo xu hướng..... và bước đầu tiếp xúc với văn minh....”", a: ["Dân gian hóa / phương Tây", "Cung đình hóa / phương Tây", "Dân gian hóa / phương Đông", "Dân gian hóa / Ấn Độ"], c: 0 },
            { q: "Nhóm ngôn ngữ Việt - Mường thuộc ngữ hệ nào?", a: ["Nam Á", "Thái - Ka-đai", "Hán - Tạng", "Nam Đảo"], c: 0 },
            { q: "Dân tộc nào chiếm đa số ở Việt Nam?", a: ["Dân tộc Kinh", "Dân tộc Tày", "Dân tộc Mường", "Dân tộc Lô Lô"], c: 0 },
            { q: "“Tam giáo đồng nguyên” là sự kết hợp hài hòa giữa:", a: ["Nho giáo - Phật giáo - Đạo giáo", "Phật giáo - Nho giáo - Công giáo", "Phật giáo - Hin-du giáo - Đạo giáo", "Nho giáo - Phật giáo - Công giáo"], c: 0 },
            { q: "Chủ trương của Đảng và Nhà nước về kinh tế trong chính sách dân tộc là:", a: ["Ưu tiên đầu tư phát triển kinh tế các vùng dân tộc và miền núi", "Phát triển kinh tế nhiều ngành", "Xây dựng cơ chế thị trường động", "Phát triển kinh tế thị trường định hướng XHCN"], c: 0 },
            { q: "Nhà nước chủ trương phát triển kinh tế miền núi để khắc phục vấn đề:", a: ["Chênh lệch giữa các vùng, các dân tộc", "Lạc hậu về khoa học kỹ thuật", "Cơ sở hạ tầng không đồng bộ", "Thiếu lương thực, thực phẩm"], c: 0 },
            { q: "Đồng bào dân tộc thiểu số phía Bắc thường canh tác ruộng bậc thang vì:", a: ["Sinh sống ở vùng địa hình cao, dốc", "Cư trú ở đồng bằng ven sông", "Chủ yếu trồng cây lương thực ngắn ngày", "Không biết làm lúa nước"], c: 0 },
            { q: "Thành phần dân tộc theo dân số ở Việt Nam hiện nay được chia thành mấy nhóm?", a: ["Hai nhóm (Đa số và thiểu số)", "Bốn nhóm", "Năm nhóm", "Ba nhóm"], c: 0 },
            { q: "Hệ tư tưởng tôn giáo nào giữ địa vị thống trị ở Việt Nam thế kỷ XV - XIX?", a: ["Nho giáo", "Đạo giáo", "Phật giáo", "Công giáo"], c: 0 },
            { q: "Tập quán ở nhà sàn của đồng bào dân tộc thiểu số chủ yếu là để:", a: ["Thích nghi địa hình núi và phòng thú dữ", "Tiết kiệm nguyên vật liệu", "Do điều kiện kinh tế khó khăn", "Do quan niệm tâm linh"], c: 0 },
            { q: "Tác phẩm được coi là bản Tuyên ngôn độc lập đầu tiên của dân tộc?", a: ["Nam quốc sơn hà", "Chiếu dời đô", "Hịch tướng sĩ", "Bình Ngô Đại cáo"], c: 0 },
            { q: "Khái niệm 'dân tộc' trong tiếng Việt hiện nay được sử dụng theo nghĩa:", a: ["Dân tộc - quốc gia và dân tộc - tộc người", "Dân tộc đa số và thiểu số", "Dân tộc miền núi và đồng bằng", "Dân tộc - tộc người và ngữ hệ"], c: 0 },
            { q: "Bộ luật Hình thư - bộ luật thành văn đầu tiên ban hành vào thời vua nào?", a: ["Lý Thái Tông", "Lý Thái Tổ", "Lý Thánh Tông", "Lý Nhân Tông"], c: 0 },
            { q: "Bộ luật Hồng Đức được hoàn thiện dưới thời vua nào?", a: ["Lê Thánh Tông", "Lê Thái Tổ", "Lê Nhân Tông", "Lê Hiển Tông"], c: 0 },
            { q: "Vị vua nào đã ban hành bộ luật Hoàng Việt luật lệ?", a: ["Vua Gia Long", "Vua Minh Mạng", "Vua Thiệu Trị", "Vua Tự Đức"], c: 0 }
        ];

        let state = {
            name: "",
            avatar: "",
            currentIdx: 0,
            score: 0,
            correct: 0,
            timer: null,
            timeLeft: 10,
            questions: []
        };

        function checkAndInit() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) return alert("Hào kiệt cho xin quý danh!");

            // Tạo Avatar ngẫu nhiên dựa trên tên (đảm bảo mỗi tên có 1 avatar riêng hoặc dùng random số)
            const randomSeed = Math.floor(Math.random() * 1000);
            state.avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${nameInput + randomSeed}`;

            let data = JSON.parse(localStorage.getItem('suviet_rank')) || [];
            const existingEntry = data.find(item => item.name.toLowerCase() === nameInput.toLowerCase());

            if (existingEntry) {
                const proceed = confirm(`Danh tính "${nameInput}" đã có trên Bảng Vàng. Bạn có muốn thi tiếp để phá kỷ lục?`);
                if (!proceed) return;
            }

            state.name = nameInput;
            
            // Hiển thị thông tin lên UI
            document.getElementById('display-name').innerText = state.name;
            document.getElementById('display-avatar').src = state.avatar;
            
            initGame();
        }

        function initGame() {
            state.questions = [...allQuestions].sort(() => Math.random() - 0.5);
            state.currentIdx = 0;
            state.score = 0;
            state.correct = 0;

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showNextQuestion();
        }

        function showNextQuestion() {
            clearInterval(state.timer);
            if (state.currentIdx >= state.questions.length) return endGame();

            const q = state.questions[state.currentIdx];
            document.getElementById('question-info').innerText = `Câu ${state.currentIdx + 1}/${state.questions.length}`;
            document.getElementById('question-text').innerText = q.q;

            const box = document.getElementById('options-box');
            box.innerHTML = "";

            let opts = q.a.map((text, i) => ({ text, isCorrect: i === q.c }));
            opts.sort(() => Math.random() - 0.5);

            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = (e) => handleAnswer(opt.isCorrect, e.target);
                box.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            state.timeLeft = 10;
            const bar = document.getElementById('timer-bar');
            state.timer = setInterval(() => {
                state.timeLeft -= 0.1;
                bar.style.width = (state.timeLeft * 10) + "%";
                if (state.timeLeft <= 0) handleAnswer(false, null);
            }, 100);
        }

        function handleAnswer(isCorrect, targetBtn) {
            clearInterval(state.timer);
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                if(targetBtn) targetBtn.classList.add('correct-flash');
                state.correct++;
                state.score += Math.max(5, Math.round(state.timeLeft * 15));
            } else {
                if(targetBtn) targetBtn.classList.add('wrong-flash');
                // Hiển thị đáp án đúng nếu trả lời sai
                buttons.forEach((b, idx) => {
                    // Logic tìm đáp án đúng ở đây có thể cải thiện, 
                    // nhưng đơn giản nhất là kiểm tra text nếu cần.
                });
            }
            
            document.getElementById('correct-count').innerText = state.correct;
            document.getElementById('current-score').innerText = state.score;
            
            state.currentIdx++;
            setTimeout(showNextQuestion, 800);
        }

        function endGame() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('res-name').innerText = state.name;
            document.getElementById('final-points').innerText = state.score;
            document.getElementById('result-avatar-box').innerHTML = `<img src="${state.avatar}" style="width:100px; border-radius:50%; border:4px solid var(--gold); margin-bottom:10px;">`;
            
            let rankMsg = "Khởi Nghĩa Quân!";
            if(state.correct > 20) rankMsg = "Lưỡng Quốc Trạng Nguyên!";
            else if(state.correct > 15) rankMsg = "Bảng Nhãn!";
            else if(state.correct > 10) rankMsg = "Tú Tài!";
            
            document.getElementById('final-msg').innerText = rankMsg;
            
            saveToLeaderboard();
            renderLeaderboard();
        }

        function saveToLeaderboard() {
            let data = JSON.parse(localStorage.getItem('suviet_rank')) || [];
            const existingIdx = data.findIndex(item => item.name.toLowerCase() === state.name.toLowerCase());
            
            if (existingIdx !== -1) {
                if (state.score > data[existingIdx].score) {
                    data[existingIdx].score = state.score;
                    data[existingIdx].avatar = state.avatar; // Cập nhật avatar mới nhất
                }
            } else {
                data.push({ name: state.name, score: state.score, avatar: state.avatar });
            }

            data.sort((a, b) => b.score - a.score);
            localStorage.setItem('suviet_rank', JSON.stringify(data.slice(0, 5)));
        }

        function renderLeaderboard() {
            const data = JSON.parse(localStorage.getItem('suviet_rank')) || [];
            document.getElementById('leaderboard-data').innerHTML = data.map((item, i) => `
                <tr style="${item.name === state.name ? 'background:#fff1f1; font-weight:bold;' : ''}">
                    <td>${i + 1}</td>
                    <td style="display:flex; align-items:center; gap:10px;">
                        <img src="${item.avatar || ''}" style="width:30px; height:30px; border-radius:50%; background:#eee;">
                        ${item.name}
                    </td>
                    <td>${item.score}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
