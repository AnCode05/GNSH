<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Be Vietnam Pro',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 30%),
    #050816;

    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
    color:white;
}

.quiz-container{
    width:100%;
    max-width:900px;
    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    padding:35px;
    box-shadow:
    0 10px 40px rgba(0,0,0,0.45),
    0 0 40px rgba(59,130,246,0.12);
}

.header{
    margin-bottom:28px;
}

.title{
    font-size:34px;
    font-weight:700;
    background:linear-gradient(90deg,#38bdf8,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
}

.sub{
    color:#94a3b8;
    font-size:15px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin:25px 0;
}

.stat-box{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:18px;
    text-align:center;
}

.stat-label{
    color:#94a3b8;
    font-size:14px;
    margin-bottom:8px;
}

.stat-value{
    font-size:26px;
    font-weight:700;
}

.correct-color{
    color:#22c55e;
}

.wrong-color{
    color:#ef4444;
}

.question-color{
    color:#38bdf8;
}

.progress-container{
    width:100%;
    height:16px;
    background:#172036;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:35px;
}

.progress-bar{
    width:0%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,#38bdf8,#8b5cf6);
    transition:0.35s;
}

.question-box{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:24px;
    padding:28px;
}

.question-number{
    color:#38bdf8;
    font-weight:600;
    margin-bottom:15px;
}

.question{
    font-size:25px;
    line-height:1.6;
    font-weight:600;
    margin-bottom:30px;
}

.answers{
    display:grid;
    gap:18px;
}

.answer{
    padding:18px 20px;
    border-radius:18px;
    background:#131c31;
    border:2px solid transparent;
    cursor:pointer;
    transition:0.25s;
    font-size:17px;
    line-height:1.5;
}

.answer:hover{
    transform:translateY(-3px);
    background:#1d2946;
    border-color:#3b82f6;
}

.correct{
    background:rgba(34,197,94,0.15)!important;
    border-color:#22c55e!important;
    color:#dcfce7;
}

.wrong{
    background:rgba(239,68,68,0.15)!important;
    border-color:#ef4444!important;
    color:#fee2e2;
}

.result{
    text-align:center;
    padding:40px 10px;
}

.result h2{
    font-size:40px;
    margin-bottom:20px;
    background:linear-gradient(90deg,#38bdf8,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.result p{
    font-size:22px;
    margin:14px 0;
}

.score{
    font-size:60px;
    font-weight:700;
    margin:20px 0;
    color:#38bdf8;
}

@media(max-width:768px){

    .quiz-container{
        padding:22px;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .question{
        font-size:20px;
    }

    .answer{
        font-size:15px;
    }

    .title{
        font-size:28px;
    }

}

</style>
</head>

function shuffleArray(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

questions.forEach(q=>{

    const correctAnswer=q.answers[q.correct];

    shuffleArray(q.answers);

    q.correct=q.answers.indexOf(correctAnswer);

});

shuffleArray(questions);

const question=document.getElementById("question");
const answers=document.getElementById("answers");
const current=document.getElementById("current");
const correct=document.getElementById("correct");
const wrong=document.getElementById("wrong");
const progressBar=document.getElementById("progressBar");
const quizArea=document.getElementById("quizArea");
const questionNumber=document.getElementById("questionNumber");

let currentQuestion=0;
let correctCount=0;
let wrongCount=0;

function loadQuestion(){

    const q=questions[currentQuestion];

    current.innerText=currentQuestion+1;

    questionNumber.innerText=`Câu ${currentQuestion+1}`;

    question.innerText=q.question;

    answers.innerHTML="";

    q.answers.forEach((answer,index)=>{

        const btn=document.createElement("div");

        btn.classList.add("answer");

        btn.innerText=answer;

        btn.onclick=()=>selectAnswer(btn,index);

        answers.appendChild(btn);

    });

    updateProgress();

}

function selectAnswer(element,index){

    const q=questions[currentQuestion];

    const allAnswers=document.querySelectorAll(".answer");

    allAnswers.forEach(btn=>{
        btn.style.pointerEvents="none";
    });

    if(index===q.correct){

        element.classList.add("correct");

        correctCount++;

    }else{

        element.classList.add("wrong");

        allAnswers[q.correct].classList.add("correct");

        wrongCount++;

    }

    correct.innerText=correctCount;

    wrong.innerText=wrongCount;

    setTimeout(()=>{

        currentQuestion++;

        if(currentQuestion<questions.length){

            loadQuestion();

        }else{

            showResult();

        }

    },1200);

}

function updateProgress(){

    const percent=((currentQuestion)/questions.length)*100;

    progressBar.style.width=percent+"%";

}

function showResult(){

    progressBar.style.width="100%";

    quizArea.innerHTML=`

        <div class="result">

            <h2>Hoàn Thành Quiz 🎉</h2>

            <div class="score">
                ${correctCount}/${questions.length}
            </div>

            <p>✅ Đúng: <b>${correctCount}</b></p>

            <p>❌ Sai: <b>${wrongCount}</b></p>

            <p>📚 Tổng câu: <b>${questions.length}</b></p>

        </div>

    `;

}

loadQuestion();

</script>
