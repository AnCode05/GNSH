<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Văn minh Đông Nam Á & Việt Nam</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }
        .question-container {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }
        .options {
            display: grid;
            gap: 10px;
        }
        .option {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            background-color: #f0f0f0;
        }
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }
        .wrong {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .feedback {
            margin-top: 10px;
            font-style: italic;
            font-weight: bold;
            display: none;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>

    <h1>ÔN TẬP LỊCH SỬ & VĂN MINH</h1>

    <div id="quiz-content"></div>

    <div class="footer">
        <p>Chúc bạn học tốt!</p>
    </div>

    <script>
        const quizData = [
            { q: "Câu 1: Văn minh Đông Nam Á thời kì cổ - trung đại chịu ảnh hưởng mạnh mẽ nhất từ nền văn minh nào sau đây?", a: ["Văn minh Lưỡng Hà", "Văn minh Hy Lạp", "Văn minh Ấn Độ", "Văn minh Ai Cập"], c: 2 },
            { q: "Câu 2: Giai đoạn phát triển rực rỡ của các quốc gia phong kiến Đông Nam Á nằm trong khoảng thời gian nào?", a: ["Từ đầu Công nguyên đến thế kỷ VII", "Từ thế kỷ X đến thế kỷ XX", "Từ thế kỷ XVI đến thế kỷ XIX", "Từ thế kỷ VII đến cuối thế kỷ XV"], c: 3 },
            { q: "Câu 3: Tôn giáo nào sau đây không phải là tôn giáo phổ biến tại Đông Nam Á thời kì cổ - trung đại?", a: ["Thần đạo (Shinto)", "Hồi giáo", "Hin-đu giáo", "Phật giáo"], c: 0 },
            { q: "Câu 4: Cơ sở quan trọng nhất dẫn đến sự hình thành văn minh Văn Lang - Âu Lạc là gì?", a: ["Văn hóa Sa Huỳnh", "Văn hóa Đông Sơn", "Văn hóa Phùng Nguyên", "Văn hóa Hòa Bình"], c: 1 },
            { q: "Câu 5: Nền văn minh Chăm-pa được hình thành trên cơ sở của nền văn hóa nào?", a: ["Văn hóa Sa Huỳnh", "Văn hóa Óc Eo", "Văn hóa Đông Sơn", "Văn hóa Đồng Nai"], c: 0 },
            { q: "Câu 6: Thành tựu đặc trưng nhất của cư dân Văn Lang - Âu Lạc thể hiện trình độ đúc đồng điêu luyện là gì?", a: ["Hệ thống thủy lợi", "Tháp Chàm", "Trống đồng", "Chữ Phạn"], c: 2 },
            { q: "Câu 7: Khái niệm 'Văn minh Đại Việt' dùng để chỉ giai đoạn lịch sử nào của Việt Nam?", a: ["Từ thế kỷ VII đến thế kỷ XV", "Từ thế kỷ X đến giữa thế kỷ XIX", "Trước Công nguyên đến thế kỷ X", "Từ năm 1945 đến nay"], c: 1 },
            { q: "Câu 8: Hệ tư tưởng nào giữ vai trò chủ đạo trong tổ chức bộ máy nhà nước và giáo dục Đại Việt từ thời Lê sơ?", a: ["Thiên Chúa giáo", "Nho giáo", "Đạo giáo", "Phật giáo"], c: 1 },
            { q: "Câu 9: Bộ luật thành văn đầu tiên của nước ta là bộ luật nào?", a: ["Quốc triều hình luật (thời Lê)", "Hoàng Việt luật lệ (thời Nguyễn)", "Hình thư (thời Lý)", "Hình luật (thời Trần)"], c: 2 },
            { q: "Câu 10: Nội dung nào sau đây phản ánh đúng đời sống vật chất của cư dân các dân tộc thiểu số ở Việt Nam?", a: ["Canh tác lúa nước trên ruộng bậc thang hoặc nương rẫy", "Sống chủ yếu trong các ngôi nhà gạch trệt", "Chỉ sử dụng vải tơ tằm để may mặc", "Phương tiện di chuyển chính là tàu hỏa"], c: 0 },
            { q: "Câu 11: Thành tựu nào dưới đây là sản phẩm của nền văn minh Chăm-pa?", a: ["Chùa Một Cột", "Thánh địa Mỹ Sơn", "Thành nhà Hồ", "Văn Miếu - Quốc Tử Giám"], c: 1 },
            { q: "Câu 12: Hoạt động kinh tế chủ yếu của cư dân Phù Nam là gì?", a: ["Săn bắn và hái lượm", "Thủ công nghiệp và khai khoáng", "Nông nghiệp lúa nước và thương mại đường biển", "Chăn nuôi gia súc quy mô lớn"], c: 2 },
            { q: "Câu 13: Những quốc gia sơ kỳ đầu tiên ở Đông Nam Á hình thành chủ yếu ở khu vực nào?", a: ["Lưu vực các dòng sông lớn và ven biển", "Các vùng núi cao và cao nguyên", "Sâu trong nội địa", "Các vùng bán hoang mạc"], c: 0 },
            { q: "Câu 14: Điểm chung về tôn giáo của các quốc gia cổ trên đất nước Việt Nam?", a: ["Đều chỉ thờ duy nhất một vị thần", "Đều tiếp nhận Đạo giáo từ rất sớm", "Đều có tín ngưỡng thờ cúng tổ tiên và các vị thần tự nhiên", "Đều lấy Thiên Chúa giáo làm quốc giáo"], c: 2 },
            { q: "Câu 15: Văn minh Đại Việt thời Lý - Trần phát triển theo hướng nào?", a: ["Chỉ chú trọng phát triển quân sự", "Kết hợp nhuần nhuyễn yếu tố bản địa và ảnh hưởng Phật giáo, Nho giáo", "Hoàn toàn rập khuôn mô hình phương Tây", "Chỉ phát triển các ngành khoa học tự nhiên"], c: 1 },
            { q: "Câu 16: Một trong những đặc điểm nổi bật của kiến trúc Đại Việt thời kì độc lập tự chủ?", a: ["Chỉ xây bằng vật liệu đá nguyên khối", "Công trình mang phong cách Ai Cập", "Xuất hiện công trình Phật giáo quy mô như tháp, chùa", "Không có công trình kiến trúc dân gian"], c: 2 },
            { q: "Câu 17: Ai thống nhất đất nước sau thời kì 12 sứ quân?", a: ["Lý Công Uẩn", "Lê Hoàn", "Đinh Bộ Lĩnh", "Ngô Quyền"], c: 2 },
            { q: "Câu 18: Tác phẩm nào được coi là bản 'Tuyên ngôn độc lập' đầu tiên?", a: ["Bình Ngô Đại Cáo", "Nam quốc sơn hà", "Tuyên ngôn Độc lập (1945)", "Hịch tướng sĩ"], c: 1 },
            { q: "Câu 19: Nghề thủ công truyền thống nào vẫn duy trì đến nay?", a: ["Làm gốm, dệt lụa", "Chế tạo vũ khí hạt nhân", "Sản xuất máy bay", "Luyện kim màu"], c: 0 },
            { q: "Câu 20: Ý nghĩa quan trọng nhất của bảo tồn di sản văn hóa?", a: ["Thu nhiều tiền du lịch", "Phục vụ quân sự", "Giữ gìn bản sắc và giá trị tinh thần", "Để so sánh với quốc gia khác"], c: 2 },
            { q: "Câu 21: Tín ngưỡng bản địa đặc trưng và lâu đời nhất của người Việt?", a: ["Thờ cúng tổ tiên", "Thờ thần Zeus", "Thờ các vị thần Hy Lạp", "Tôn thờ các vị thần Ấn Độ giáo"], c: 0 },
            { q: "Câu 22: Đặc điểm chung của nhà ở truyền thống cư dân Việt cổ?", a: ["Nhà lầu gạch", "Nhà chung cư", "Nhà sàn mái cong hình thuyền hoặc mái tròn", "Nhà lều da thú"], c: 2 },
            { q: "Câu 23: Trang phục phổ biến của nam giới Văn Lang - Âu Lạc?", a: ["Mặc com-lê", "Mặc áo dài khăn đóng", "Ở trần, đóng khố", "Mặc áo giáp sắt"], c: 2 },
            { q: "Câu 24: Di sản Chăm-pa nào được UNESCO công nhận là Di sản Văn hóa Thế giới?", a: ["Cố đô Huế", "Thành nhà Hồ", "Thánh địa Mỹ Sơn", "Phố cổ Hội An"], c: 2 },
            { q: "Câu 25: Chữ viết của người Chăm cổ dựa trên cơ sở loại chữ nào?", a: ["Chữ Phạn (Sanskrit)", "Chữ Hán", "Chữ Latinh", "Chữ Nôm"], c: 0 },
            { q: "Câu 26: Tình hình tôn giáo ở Đại Việt thời Lý - Trần?", a: ["Nho giáo độc tôn", "Tam giáo đồng nguyên", "Chỉ có Phật giáo", "Thiên Chúa giáo là quốc giáo"], c: 1 },
            { q: "Câu 27: Triều Nguyễn xây dựng công trình cung đình nào đồ sộ nhất?", a: ["Hoàng thành Thăng Long", "Kinh thành Huế", "Thành Gia Định", "Thành cổ Loa"], c: 1 },
            { q: "Câu 28: Lễ hội truyền thống lớn nhất ở đồng bằng Bắc Bộ?", a: ["Lễ hội Tháp Bà Ponagar", "Lễ hội đua ghe Ngo", "Lễ hội chùa Hương", "Lễ hội Cầu ngư"], c: 2 },
            { q: "Câu 29: Giá trị cốt lõi văn minh Đại Việt để lại?", a: ["Kỹ thuật xây nhà cao tầng", "Tinh thần yêu nước, tự cường và nhân ái", "Công thức món ăn Tây Âu", "Hệ thống máy móc hiện đại"], c: 1 },
            { q: "Câu 30: Ý nghĩa duy trì trò chơi dân gian?", a: ["Giữ gìn giá trị văn hóa truyền thống", "Thay thế thể thao hiện đại", "Chỉ phục vụ khách du lịch", "Không có ý nghĩa gì"], c: 0 },
            { q: "Câu 31: Khoa thi đầu tiên của nhà Lý tổ chức năm nào?", a: ["1010", "1075", "1225", "1428"], c: 1 },
            { q: "Câu 32: Quốc Tử Giám được xây dựng dưới triều vua nào?", a: ["Lý Thái Tổ", "Lý Nhân Tông", "Lý Thánh Tông", "Trần Thánh Tông"], c: 2 },
            { q: "Câu 33: Loại chữ viết người Việt tạo ra dựa trên chữ Hán?", a: ["Chữ Quốc ngữ", "Chữ Nôm", "Chữ Phạn", "Chữ Chăm cổ"], c: 1 },
            { q: "Câu 34: Bình Ngô Đại Cáo ra đời sau thắng lợi của cuộc khởi nghĩa nào?", a: ["Hai Bà Trưng", "Lý Bí", "Lam Sơn", "Tây Sơn"], c: 2 },
            { q: "Câu 35: Múa rối nước ra đời từ nền văn minh nào?", a: ["Văn minh Chăm-pa", "Văn minh Đại Việt", "Văn minh Phù Nam", "Văn minh Trung Hoa"], c: 1 },
            { q: "Câu 36: Di sản phi vật thể vinh danh năm 2003?", a: ["Hát Xoan", "Đờn ca tài tử", "Nhã nhạc cung đình Huế", "Ca trù"], c: 2 },
            { q: "Câu 37: Thầy thuốc tiêu biểu nhất lịch sử Đại Việt?", a: ["Chu Văn An", "Hải Thượng Lãn Ông", "Nguyễn Trãi", "Lê Quý Đôn"], c: 1 },
            { q: "Câu 38: Ý nghĩa dựng bia Tiến sĩ tại Văn Miếu?", a: ["Trang trí", "Tôn vinh nhân tài và khuyến học", "Ghi chép quân sự", "Làm cột mốc địa giới"], c: 1 },
            { q: "Câu 39: Tình hình văn học Đại Việt thế kỷ X - XIX?", a: ["Chỉ có văn học dân gian", "Phát triển song song chữ Hán và chữ Nôm", "Bị thay thế bởi văn học phương Tây", "Chỉ tập trung tôn giáo"], c: 1 },
            { q: "Câu 40: Thách thức lớn nhất bảo tồn di sản hiện nay?", a: ["Quá nhiều người quan tâm", "Đô thị hóa và biến đổi khí hậu", "Không còn di sản nào", "Di sản không giá trị"], c: 1 },
            { q: "Câu 41: Di sản văn hóa vật thể là?", a: ["Quan họ Bắc Ninh", "Hoàng thành Thăng Long", "Bài Chòi", "Thờ cúng Hùng Vương"], c: 1 },
            { q: "Câu 42: Vương quốc Phù Nam hình thành chủ yếu ở khu vực nào?", a: ["Vùng núi phía Bắc", "Duyên hải miền Trung", "Khu vực Nam Bộ", "Vùng Tây Nguyên"], c: 2 },
            { q: "Câu 43: Thương cảng tiêu biểu nhất của Phù Nam?", a: ["Vân Đồn", "Hội An", "Óc Eo", "Đà Nẵng"], c: 2 },
            { q: "Câu 44: Điểm giống nhau về tự nhiên của 3 nền văn minh cổ Việt Nam?", a: ["Vùng núi cao", "Gắn với sông lớn và biển", "Bán hoang mạc", "Không có khoáng sản"], c: 1 },
            { q: "Câu 45: Thành tựu khẩn hoang, mở mang bờ cõi của Đại Việt?", a: ["Xây thành lũy quân sự", "Xác lập chủ quyền vùng đất Nam Bộ", "Ngừng sản xuất đi biển", "Chế tạo tàu hơi nước"], c: 1 },
            { q: "Câu 46: Ý nghĩa UNESCO công nhận di sản Việt Nam?", a: ["Thành nước công nghiệp", "Khẳng định giá trị văn hóa và trách nhiệm bảo tồn", "Không cần đầu tư ngân sách", "Ép nước khác dùng tiếng Việt"], c: 1 },
            { q: "Câu 47: Cố đô Huế gắn liền với triều đại nào?", a: ["Lý", "Trần", "Lê sơ", "Nguyễn"], c: 3 },
            { q: "Câu 48: Người Việt tiếp thu văn hóa bên ngoài để?", a: ["Thay thế văn hóa bản địa", "Làm phong phú bản sắc dân tộc", "Thành văn hóa phương Tây", "Xóa bỏ phong tục cũ"], c: 1 },
            { q: "Câu 49: Trách nhiệm thế hệ trẻ với di sản?", a: ["Chỉ cần biết tên", "Trân trọng, bảo vệ và giới thiệu", "Thay đổi cấu trúc theo ý thích", "Không cần quan tâm"], c: 1 },
            { q: "Câu 50: Nội dung đúng về tiến trình văn minh Việt Nam?", a: ["Dòng chảy liên tục, kế thừa và phát triển", "Không liên quan nhau", "Bắt đầu từ khi Pháp xâm lược", "Sao chép hoàn toàn từ bên ngoài"], c: 0 }
        ];

        const container = document.getElementById('quiz-content');

        quizData.forEach((item, qIndex) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container';
            
            const qText = document.createElement('span');
            qText.className = 'question-text';
            qText.innerText = item.q;
            qDiv.appendChild(qText);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            const feedback = document.createElement('div');
            feedback.className = 'feedback';
            feedback.id = `fb-${qIndex}`;

            item.a.forEach((opt, oIndex) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = String.fromCharCode(65 + oIndex) + ". " + opt;
                optDiv.onclick = function() {
                    checkAnswer(qIndex, oIndex, item.c, optionsDiv, feedback);
                };
                optionsDiv.appendChild(optDiv);
            });

            qDiv.appendChild(optionsDiv);
            qDiv.appendChild(feedback);
            container.appendChild(qDiv);
        });

        function checkAnswer(qIdx, selectedIdx, correctIdx, optionsContainer, feedback) {
            const options = optionsContainer.children;
            
            // Disable clicking again
            for (let opt of options) {
                opt.style.pointerEvents = 'none';
            }

            if (selectedIdx === correctIdx) {
                options[selectedIdx].classList.add('correct');
                feedback.innerText = "Chính xác!";
                feedback.style.color = "#155724";
            } else {
                options[selectedIdx].classList.add('wrong');
                options[correctIdx].classList.add('correct');
                feedback.innerText = "Sai rồi! Đáp án đúng là: " + String.fromCharCode(65 + correctIdx);
                feedback.style.color = "#721c24";
            }
            feedback.style.display = 'block';
        }
    </script>
</body>
</html>
